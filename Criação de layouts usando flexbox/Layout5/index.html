<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="news-list-container">
        
        <article class="news-item">
            <div class="slot image-slot">Imagem da Notícia 1</div>
            <div class="news-content">
                <div class="slot category-slot">Categoria 1</div>
                <h2 class="slot title-slot">Título 1</h2>
                <p class="slot summary-slot">Subtítulo 1</p>
                <div class="slot meta-slot">Há X minutos — Em Categoria 1</div>
            </div>
        </article>

        <article class="news-item">
            <div class="slot image-slot">Imagem da Notícia 2</div>
            <div class="news-content">
                <div class="slot category-slot">Categoria 2</div>
                <h2 class="slot title-slot">Título 2</h2>
                <p class="slot summary-slot">Subtítulo 2</p>
                <div class="slot meta-slot">Há X minutos — Em Categoria 2</div>
            </div>
        </article>

        <article class="news-item">
            <div class="slot image-slot">Imagem da Notícia 3</div>
            <div class="news-content">
                <div class="slot category-slot">Categoria 3</div>
                <h2 class="slot title-slot">Título 3</h2>
                <p class="slot summary-slot">Subtítulo 3</p>
                <div class="slot meta-slot">Há X minutos — Em Categoria 3</div>
            </div>
        </article>

    </main>

</body>
</html>
