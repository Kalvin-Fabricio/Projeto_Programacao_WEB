<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="slot logo-slot">Logo</div>
            <nav class="nav-links">
                <div class="slot link-slot">Link 1</div>
                <div class="slot link-slot">Link 2</div>
                <div class="slot link-slot">Link 3</div>
                <div class="slot link-slot">Link 4</div>
                <div class="slot link-slot">Link 5</div>
            </nav>
        </div>
        
        <div class="header-right">
            <div class="slot link-slot">Link 6</div>
            <div class="slot btn-outline-header">Botão Sup 1</div>
            <div class="slot btn-solid-header">Botão Sup 2</div>
        </div>
    </header>

    <main>
        <section class="left-col">
            <div class="content-wrapper">
                <div class="slot title-slot">
                    <strong>Título</strong>
                </div>
                
                <div class="slot desc-slot">
                    Texto 
                </div>
                
                <div class="button-group">
                    <div class="slot btn-solid-main">
                        Botão Inf 1
                    </div>
                    <div class="slot btn-outline-main">
                        Botão Inf 2
                    </div>
                </div>
            </div>
        </section>

        <section class="right-col">
            <div class="slot image-column-slot">
                Imagem 
            </div>
        </section>
    </main>

</body>
</html>
