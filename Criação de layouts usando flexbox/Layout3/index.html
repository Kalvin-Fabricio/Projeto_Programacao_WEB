<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-left">
            <div class="slot logo-slot">Logo</div>
            <nav class="nav-links">
                <div class="slot link-slot">Link 1</div>
                <div class="slot link-slot">Link 2</div>
                <div class="slot link-slot">Link 3</div>
                <div class="slot link-slot">Link 4</div>
                <div class="slot link-slot">Link 5</div>
                <div class="slot link-slot">Botão Sup 1</div>
            </nav>
        </div>
        
        <div class="header-right">
            <div class="slot search-slot">Q</div>
            <div class="slot link-slot">Botão Sup 2</div>
            <div class="slot btn-outline-header">Criar uma conta</div>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="content-wrapper">
                <div class="slot title-slot">
                    Título
                </div>
                
                <div class="slot desc-slot">
                    Texto
                </div>
                
                <div class="action-group">
                    <div class="input-group">
                        <div class="slot input-slot">Digite seu e-mail</div>
                        <div class="slot btn-green-main">Botão Inf 1</div>
                    </div>
                    <div class="slot btn-outline-main">Botão Inf 2</div>
                </div>
            </div>
        </section>
    </main>

    <div class="slot floating-up-btn">^</div>

</body>
</html>
