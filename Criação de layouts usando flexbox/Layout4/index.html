<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="layout-container">
        
        <section class="trending-section">
            <h2 class="slot section-title">Título da Seção 1</h2>
            
            <div class="carousel-wrapper">
                <div class="slot poster-slot">
                    <span class="rank-number">1</span>
                    <div class="poster-image">Poster 1</div>
                </div>
                <div class="slot poster-slot">
                    <span class="rank-number">2</span>
                    <div class="poster-image">Poster 2</div>
                </div>
                <div class="slot poster-slot">
                    <span class="rank-number">3</span>
                    <div class="poster-image">Poster 3</div>
                </div>
                <div class="slot poster-slot">
                    <span class="rank-number">4</span>
                    <div class="poster-image">Poster 4</div>
                </div>
                <div class="slot poster-slot">
                    <span class="rank-number">5</span>
                    <div class="poster-image">Poster 5</div>
                </div>
                <div class="slot poster-slot">
                    <span class="rank-number">6</span>
                    <div class="poster-image">Poster 6</div>
                </div>
                
                <div class="slot arrow-btn">&gt;</div>
            </div>
        </section>

        <section class="reasons-section">
            <h2 class="slot section-title">Título da Seção 2</h2>
            
            <div class="cards-grid">
                <div class="slot reason-card">
                    <h3 class="card-title">Título do Card 1</h3>
                    <p class="card-text">Texto</p>
                    <div class="slot card-icon">Ícone</div>
                </div>
                <div class="slot reason-card">
                    <h3 class="card-title">Título do Card 2</h3>
                    <p class="card-text">Texto</p>
                    <div class="slot card-icon">Ícone</div>
                </div>
                <div class="slot reason-card">
                    <h3 class="card-title">Título do Card 3</h3>
                    <p class="card-text">Texto</p>
                    <div class="slot card-icon">Ícone</div>
                </div>
                <div class="slot reason-card">
                    <h3 class="card-title">Título do Card</h3>
                    <p class="card-text">Texto</p>
                    <div class="slot card-icon">Ícone</div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
