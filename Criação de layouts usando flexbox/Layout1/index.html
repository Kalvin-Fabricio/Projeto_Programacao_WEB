<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="slot logo-slot">Logo</div>
        
        <div class="nav-container">
            <nav>
                <div class="slot nav-link">Link 1</div>
                <div class="slot nav-link">Link 2</div>
                <div class="slot nav-link">Link 3</div>
                <div class="slot nav-link">Link 4</div>
            </nav>
            <div class="slot btn-header">Botão Superior</div>
        </div>
    </header>

    <main>
        <section class="left-col">
            <div class="content-wrapper">
                <div class="slot title-slot">
                    <strong>Título Principal</strong>
                </div>
                
                <div class="slot desc-slot">
                    Texto
                </div>
                
                <div class="slot link-minor-slot">
                    Link Superior
                </div>
                
                <div class="slot btn-main-slot">
                    Botão Principal
                </div>
                
                <div class="slot link-bottom-slot">
                    Link Inferior
                </div>
            </div>
        </section>

        <section class="right-col">
            <div class="slot image-slot">
                Imagem
            </div>
        </section>
    </main>

</body>
</html>
